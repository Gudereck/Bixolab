    </nav>

    <div class="nav-actions">
      <a href="https://wa.link/cqiozw" target="_blank" rel="noopener noreferrer" class="nav-btn-outline">
        <i class="fa-brands fa-whatsapp"></i> Fale com a gente
      </a>
    </div>
  </div>
</header>
